name: Verify Generated Files and Import Organization
on:
  push:
    branches:
      - '**'
    paths:
      - '**.go'
      - '**go.mod'
      - '**go.sum'
      - 'ai/**'
      - '.claude/**'
      - '.cursor/**'
    tags-ignore:
      - 'v*'
  pull_request:
    paths:
      - '**.go'
      - '**go.mod'
      - '**go.sum'
      - 'ai/**'
      - '.claude/**'
      - '.cursor/**'
jobs:
  verify-imports:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set Go
      uses: actions/setup-go@v5
      with:
        go-version-file: './go.mod'
    - name: Verify that imports are organized
      run: make verify-imports
  verify-agents-config:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      run: pip install uv==0.7.14
    - name: Verify AI agent config is in sync
      run: make verify-agents-config
